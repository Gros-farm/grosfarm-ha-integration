name: Validate

on:
  push:
  pull_request:
  schedule:
    # Weekly run catches breakage from new HA / HACS releases.
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand icons live in home-assistant/brands; ignore until that PR lands.
          ignore: brands
