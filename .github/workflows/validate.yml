name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly run catches breakage from new HA / HACS releases.
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    # Not publishing to HACS yet. hacs/action's repo-level checks (description,
    # topics) fail on a not-yet-prepared repo, so this runs on demand only for now.
    # Drop the `if` (or add push/pull_request) once we start preparing the HACS PR.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand icons live in home-assistant/brands; ignore until that PR lands.
          ignore: brands
